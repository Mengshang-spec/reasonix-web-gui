<!DOCTYPE html>
<html lang="en" data-platform="windows" data-theme-style="graphite">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reasonix</title>
<style>
/* ================================================================
   Reasonix Web — Faithful replica of the real Reasonix Desktop CSS
   Based on esengine/DeepSeek-Reasonix desktop/frontend/src/styles.css
   ================================================================ */

/* ===== CSS VARIABLES (Graphite theme - real Reasonix default) ===== */
:root {
  color-scheme: dark;
  /* surfaces */
  --bg: #0c0d10;
  --bg-soft: #101115;
  --bg-elev: #15161a;
  --bg-elev-2: #191a1f;
  --sidebar-bg: #15161a;
  --sidebar-hover: #1f2026;
  --sidebar-active: rgba(255, 106, 61, 0.16);
  --chat-bg: #0c0d10;
  --border: rgba(255, 255, 255, 0.10);
  --border-soft: rgba(255, 255, 255, 0.07);

  /* text */
  --fg: #f1f1ef;
  --fg-dim: #a7a8ad;
  --fg-faint: #6c6e74;

  /* brand + semantic */
  --accent: #ff6a3d;
  --accent-soft: rgba(255, 106, 61, 0.16);
  --accent-strong: #ff9a52;
  --ok: #3ad17e;
  --warn: #e3a23a;
  --err: #f0573f;
  --danger: #e5484d;

  /* diff */
  --add-bg: rgba(58, 209, 126, 0.12);
  --add-fg: #3ad17e;
  --del-bg: rgba(240, 87, 63, 0.12);
  --del-fg: #f0573f;

  /* fonts (system stack, no web fonts — matches real Reasonix) */
  --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-mono: "Cascadia Code", "JetBrains Mono", "SF Mono", Consolas, monospace;
  --font-code: 12px;
  --font-caption: 11px;
  --font-status: 11px;

  --radius: 8px;
  --maxw: 820px;
  --mono: var(--font-mono);
  --sans: var(--font-ui);
}

/* ===== RESET ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body, #root {
  height: 100%;
  margin: 0; padding: 0;
}
html { background: var(--bg); }
body {
  background: var(--bg); color: var(--fg);
  font-family: var(--font-ui); font-size: 13px; overflow: hidden;
  display: flex;
}
#root { flex: 1; min-width: 0; display: flex; }

/* ===== APP SHELL ===== */
#app {
  display: flex; width: 100%; flex: 1; min-width: 0;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 240px; min-width: 180px; flex-shrink: 0;
  background: var(--sidebar-bg); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; z-index: 10;
  -webkit-app-region: drag;
}
.sidebar__head {
  padding: 14px 16px; border-bottom: 1px solid var(--border-soft);
  display: flex; align-items: center; gap: 10px;
}
.sidebar__logo {
  width: 26px; height: 26px; border-radius: 6px;
  background: var(--accent); color: #0c0d10;
  font-weight: 700; font-size: 14px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.sidebar__title { font-weight: 650; font-size: 14px; color: var(--fg); }
.sidebar__ver  { font-size: 10px; color: var(--fg-faint); }
.sidebar__sec  { padding: 6px 10px; }
.sidebar__label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--fg-faint); padding: 6px 10px 8px; font-weight: 600;
}
.sidebar__item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border-radius: 7px;
  font-size: 12px; color: var(--fg-dim);
  cursor: pointer; transition: all 0.12s; margin-bottom: 1px;
  -webkit-app-region: no-drag;
}
.sidebar__item:hover { background: var(--sidebar-hover); color: var(--fg); }
.sidebar__item--active {
  background: var(--sidebar-active); color: var(--fg); font-weight: 600;
}
.sidebar__item .sb-ico { flex-shrink: 0; font-size: 13px; width: 18px; text-align: center; }
.sidebar__item .sb-tag {
  margin-left: auto; font-size: 10px; background: var(--bg-soft);
  color: var(--fg-faint); padding: 1px 6px; border-radius: 4px;
}
.sidebar__spacer { flex: 1; }
.sb-new-session {
  cursor: pointer; font-size: 14px; color: var(--fg-dim);
  padding: 2px 6px; border-radius: 4px; transition: all 0.12s;
  line-height: 1;
}
.sb-new-session:hover { background: var(--sidebar-hover); color: var(--ok); }
.sb-del-btn {
  margin-left: auto; cursor: pointer; opacity: 0;
  font-size: 10px; color: var(--fg-faint);
  transition: opacity 0.12s, color 0.12s;
  padding: 2px 4px; border-radius: 3px;
}
.sb-del-btn:hover { color: var(--err); background: rgba(240,87,63,0.12); }
.sidebar__item:hover .sb-del-btn { opacity: 1; }

/* ===== MAIN AREA ===== */
.main {
  flex: 1; display: flex; flex-direction: column; min-width: 0;
  background: var(--chat-bg);
}

/* ===== TOPIC BAR ===== */
.topicbar {
  height: 42px; min-height: 42px; flex-shrink: 0;
  display: flex; align-items: center; gap: 10px;
  padding: 0 16px; background: var(--bg-elev);
  border-bottom: 1px solid var(--border-soft);
}
.topicbar__title { font-weight: 650; font-size: 13px; }
.topicbar__cwd   { font-size: 11px; color: var(--fg-faint); font-family: var(--font-mono); }
.topicbar__spacer { flex: 1; }
.topicbar__btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 5px 12px; border-radius: 7px;
  border: 1px solid var(--border); background: transparent;
  color: var(--fg-dim); font-size: 12px; cursor: pointer;
  font-family: var(--font-ui); transition: all 0.12s;
  -webkit-app-region: no-drag;
}
.topicbar__btn:hover { background: var(--sidebar-hover); color: var(--fg); }
.topicbar__btn--accent { border-color: var(--accent); color: var(--accent); }
.topicbar__btn--accent:hover { background: var(--accent-soft); }
.topicbar__btn--new-session {
  border-color: var(--ok); color: var(--ok);
  font-weight: 600;
}
.topicbar__btn--new-session:hover { background: rgba(58,209,126,0.12); }

/* ===== PAGE SYSTEM ===== */
.page-container { flex: 1; overflow: hidden; position: relative; }
.page { position: absolute; inset: 0; display: none; flex-direction: column; overflow: hidden; }
.page--active { display: flex; }

/* ===== CHAT PAGE ===== */
.transcript { flex: 1; overflow-y: auto; padding: 16px 0; }
.transcript__inner { max-width: var(--maxw); margin: 0 auto; padding: 0 20px; }

/* -- System message -- */
.msg--system { text-align: center; font-size: 11px; color: var(--fg-faint); padding: 6px 0; }

/* -- User message (matches real .msg--user) -- */
.msg--user { display: flex; justify-content: flex-end; margin: 6px 0; color: var(--fg); }
.msg--user .msg__body {
  max-width: 82%; background: var(--bg-elev-2);
  border: 1px solid var(--border-soft); border-radius: 14px;
  padding: 10px 16px; position: relative;
}
.msg--user .msg__text {
  white-space: pre-wrap; word-break: break-word;
  font-weight: 450; line-height: 1.65;
}

/* -- Assistant message (matches real .msg--assistant) -- */
.msg--assistant { margin: 6px 0; }
.msg--assistant .msg__body { line-height: 1.65; }
.msg--assistant .msg__body strong { color: #fff; font-weight: 600; }
.msg--assistant .msg__body em { color: var(--fg-dim); }
.msg--assistant .msg__body code {
  font-family: var(--font-mono); font-size: 11px;
  background: var(--bg-soft); padding: 1px 5px;
  border-radius: 4px; color: #e5c07b;
}
.msg--assistant .msg__body pre {
  background: var(--bg-soft); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 14px; margin: 8px 0;
  overflow-x: auto; font-family: var(--font-mono);
  font-size: 12px; line-height: 1.55; white-space: pre-wrap;
}
.msg--assistant .msg__body pre code { background: none; padding: 0; color: var(--fg-dim); }
.msg--assistant .msg__body p { margin: 5px 0; }
.msg--assistant .msg__body ul, .msg--assistant .msg__body ol { margin: 5px 0; padding-left: 20px; }

/* -- Tool card (matches real .tool) -- */
.tool {
  margin: 6px 0; overflow: hidden;
  content-visibility: auto; contain-intrinsic-size: 1px 36px;
}
.tool__head {
  display: flex; align-items: center; gap: 4px;
  padding: 3px 8px; background: none; border: none;
  color: var(--fg-faint); font: inherit; font-size: 13px;
  text-align: left; cursor: pointer; border-radius: 4px;
  width: 100%;
}
.tool__head:hover { color: var(--fg); }
.tool__status-icon { font-size: 13px; line-height: 1; flex-shrink: 0; }
.tool__status-icon--ok { color: var(--ok); }
.tool__status-icon--err { color: var(--err); }
.tool__status-icon--stopped { color: var(--fg-faint); }
.tool__name {
  font-family: var(--font-mono); font-size: var(--font-code);
  font-weight: 600; color: inherit; flex-shrink: 0;
}
.tool__subject {
  flex: 1 1 auto; min-width: 0; color: inherit;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.tool__duration {
  color: inherit; font-variant-numeric: tabular-nums;
  white-space: nowrap; flex-shrink: 0;
}
.tool__chevron {
  flex-shrink: 0; color: var(--fg-faint);
  transition: transform 0.2s;
}
.tool__chevron--open { transform: rotate(90deg); }
.tool__body {
  overflow: hidden; border-left: 2px solid var(--border);
  padding-left: 12px; display: none;
}
.tool__body--open { display: block; }
.tool__body .code-block {
  background: var(--bg-soft); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 12px; margin: 4px 0;
  font-family: var(--font-mono); font-size: 11px;
  line-height: 1.5; overflow-x: auto; white-space: pre-wrap;
  color: var(--fg-dim); max-height: 280px; overflow-y: auto;
}
.tool__body .tool__showall {
  display: inline-block; margin-top: 4px; padding: 2px 8px;
  font-size: 11px; color: var(--accent); background: var(--accent-soft);
  border: none; border-radius: 4px; cursor: pointer; line-height: 1.6;
}
.tool__body .tool__showall:hover { background: rgba(255,106,61,0.25); }
.tool__note {
  font-size: var(--font-caption); color: var(--fg-faint); margin-top: 3px;
}
.tool__err {
  margin: 0 0 8px 0; padding: 7px 10px;
  background: var(--del-bg); color: var(--err);
  border-radius: 6px; font-family: var(--font-mono);
  font-size: 12px; white-space: pre-wrap;
}

/* ===== COMPOSER (matches real Composer styling) ===== */
.composer-wrap { flex-shrink: 0; padding: 0 20px 14px; max-width: var(--maxw); margin: 0 auto; width: 100%; }
.composer {
  border: 1px solid var(--border); border-radius: 10px;
  background: var(--bg-elev-2); transition: border-color 0.15s;
}
.composer:focus-within { border-color: var(--accent); }
.composer__row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border-soft);
}
.composer__row:last-child { border-bottom: none; border-top: 1px solid var(--border-soft); }

/* Mode chip */
.mode-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 5px;
  font-size: 10px; font-weight: 650; cursor: pointer;
  border: 1px solid var(--border); background: var(--bg-soft);
  color: var(--fg-dim); font-family: var(--font-ui);
  text-transform: uppercase; letter-spacing: 0.02em;
  transition: all 0.12s;
}
.mode-chip:hover { background: var(--bg-elev-2); color: var(--fg); }
.mode-chip--plan { background: var(--accent-soft); color: var(--accent); border-color: rgba(255,106,61,0.3); }
.mode-chip--plan:hover { background: rgba(255,106,61,0.25); }
.mode-chip--yolo { background: rgba(240,87,63,0.15); color: var(--err); border-color: rgba(240,87,63,0.3); }
.mode-chip--yolo:hover { background: rgba(240,87,63,0.25); }

.composer__model {
  margin-left: auto; font-size: 11px; color: var(--fg-faint);
  display: flex; align-items: center; gap: 5px;
}
.composer__model-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--ok); flex-shrink: 0; }

.composer__textarea {
  width: 100%; min-height: 44px; max-height: 200px;
  padding: 12px 14px; background: transparent; border: none; outline: none;
  color: var(--fg); font-family: var(--font-ui); font-size: 13px;
  line-height: 1.55; resize: none; caret-color: var(--accent);
}
.composer__textarea::placeholder { color: var(--fg-faint); }

.composer__hint { font-size: 10px; color: var(--fg-faint); }

.composer__send {
  width: 30px; height: 30px; border-radius: 7px; flex-shrink: 0;
  border: none; background: var(--accent); color: #0c0d10;
  cursor: pointer; font-size: 16px; display: flex;
  align-items: center; justify-content: center;
  margin-left: auto; transition: all 0.12s;
}
.composer__send:hover { background: var(--accent-strong); }
.composer__send:active { transform: scale(0.95); }

/* ===== STATUS BAR (matches real .statusbar) ===== */
.statusbar {
  max-width: var(--maxw); margin: 7px auto 7px;
  display: flex; align-items: center; gap: 0;
  font-family: var(--font-ui); font-size: var(--font-status);
  font-variant-numeric: tabular-nums; line-height: 1.35;
  color: var(--fg-faint); white-space: nowrap; overflow: hidden;
  padding: 0 20px; width: 100%;
}
.statusbar__group {
  display: inline-flex; align-items: center; gap: 0;
  min-width: 0; flex-shrink: 0;
}
.statusbar__group + .statusbar__group {
  margin-left: 18px; padding-left: 18px;
  border-left: 1px solid rgba(108,110,116,0.18);
}
.statusbar__group > * + * {
  display: inline-flex; align-items: center;
}
.statusbar__group > * + *::before {
  content: "|"; margin: 0 9px;
  color: rgba(108,110,116,0.5);
  font-family: var(--font-mono); font-weight: 400;
}
.stat {
  display: inline-flex; align-items: center; gap: 4px;
  min-width: 0; white-space: nowrap;
  font-variant-numeric: tabular-nums;
}
.stat b { color: var(--fg-dim); font-weight: 600; }
.stat__label { color: var(--fg-faint); }
.statusbar__dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; background: var(--ok); }
.statusbar__dot--busy { background: var(--warn); animation: pulse-dot 0.8s ease-in-out infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }
.statusbar__plan { color: var(--accent); font-weight: 600; }
.statusbar__yolo { color: var(--err); font-weight: 600; }
.statusbar__spacer { flex: 1; }

/* ===== RIGHT DOCK ===== */
.rightdock {
  width: 320px; min-width: 260px; flex-shrink: 0;
  background: var(--bg-elev); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; z-index: 10;
}
.rightdock__tabs {
  display: flex; border-bottom: 1px solid var(--border-soft);
  padding: 0 10px; flex-shrink: 0;
}
.rightdock__tab {
  padding: 10px 14px; font-size: 12px; color: var(--fg-faint);
  cursor: pointer; border-bottom: 2px solid transparent;
  font-weight: 500; transition: all 0.12s;
}
.rightdock__tab--active { color: var(--fg); border-bottom-color: var(--accent); }
.rightdock__tab:hover { color: var(--fg-dim); }
.rightdock__body { flex: 1; overflow-y: auto; padding: 14px; }
.rightdock__sec { margin-bottom: 18px; }
.rightdock__sec-title {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--fg-faint); margin-bottom: 10px; font-weight: 600;
}
.ctx-gauge {
  height: 5px; border-radius: 3px; background: var(--bg-soft);
  margin-bottom: 6px; overflow: hidden;
}
.ctx-gauge__fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.5s; }
.ctx-stats { display: flex; justify-content: space-between; font-size: 10px; color: var(--fg-faint); font-family: var(--font-mono); }
.file-row {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 8px; border-radius: 6px;
  font-size: 12px; color: var(--fg-dim);
  cursor: pointer; transition: background 0.1s; min-height: 28px;
}
.file-row:hover { background: var(--sidebar-hover); color: var(--fg); }
.file-row .fr-add { color: var(--add-fg); margin-left: auto; font-size: 10px; font-family: var(--font-mono); }
.file-row .fr-del { color: var(--del-fg); margin-left: 4px; font-size: 10px; font-family: var(--font-mono); }
.tool-tag {
  display: inline-block; font-size: 10px; padding: 3px 7px; border-radius: 4px;
  background: var(--bg-soft); color: var(--fg-dim); margin: 2px;
}

/* ===== SETTINGS PAGE ===== */
.page--settings { padding: 30px 40px; max-width: 700px; overflow-y: auto; }
.page--settings h2 { font-size: 18px; font-weight: 650; margin-bottom: 24px; }
.set-group { margin-bottom: 28px; }
.set-group h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--fg-faint); margin-bottom: 12px; font-weight: 600; }
.set-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-soft); }
.set-row .lbl { font-size: 13px; color: var(--fg); }
.set-row .desc { font-size: 11px; color: var(--fg-faint); margin-top: 2px; }
.set-row select, .set-row input[type=text] { background: var(--bg-soft); border: 1px solid var(--border); border-radius: 6px; color: var(--fg); padding: 6px 10px; font-size: 12px; font-family: inherit; min-width: 160px; }
.toggle-sw { width: 40px; height: 22px; border-radius: 11px; background: var(--bg-soft); border: 1px solid var(--border); cursor: pointer; position: relative; transition: all 0.2s; }
.toggle-sw--on { background: var(--accent); border-color: var(--accent); }
.toggle-sw::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: #fff; transition: transform 0.2s; }
.toggle-sw--on::after { transform: translateX(18px); }

/* ===== SESSIONS PAGE ===== */
.page--sessions { padding: 30px 40px; max-width: 700px; overflow-y: auto; }
.page--sessions h2 { font-size: 18px; font-weight: 650; margin-bottom: 20px; }
.sess-card {
  background: var(--bg-elev); border: 1px solid var(--border);
  border-radius: 9px; padding: 14px 16px; margin-bottom: 8px;
  cursor: pointer; transition: all 0.12s; display: flex; align-items: center; gap: 12px;
}
.sess-card:hover { background: var(--bg-elev-2); border-color: rgba(255,255,255,0.15); }
.sess-card__av { width: 34px; height: 34px; border-radius: 7px; background: var(--bg-soft); display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
.sess-card__info { flex: 1; }
.sess-card__name { font-weight: 600; font-size: 13px; }
.sess-card__sub { font-size: 11px; color: var(--fg-faint); margin-top: 2px; }
.sess-card__meta { font-size: 10px; color: var(--fg-faint); text-align: right; }

/* ===== SKILLS PAGE ===== */
.page--skills { padding: 30px 40px; max-width: 700px; overflow-y: auto; }
.page--skills h2 { font-size: 18px; font-weight: 650; margin-bottom: 6px; }
.skill-tag-inline { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; background: rgba(58,209,126,0.12); color: var(--ok); margin-left: 6px; }
.skill-tag-sub { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; background: rgba(198,120,221,0.12); color: #c678dd; margin-left: 6px; }

/* ===== COMMAND PALETTE OVERLAY ===== */
.palette-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55);
  z-index: 100; display: none; align-items: flex-start; justify-content: center;
  padding-top: 15vh;
}
.palette-overlay--open { display: flex; }
.palette {
  width: 560px; max-width: 92vw; background: var(--bg-elev);
  border: 1px solid var(--border); border-radius: 12px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5); overflow: hidden;
}
.palette__input {
  padding: 16px 18px; border-bottom: 1px solid var(--border-soft);
}
.palette__input input {
  width: 100%; background: transparent; border: none; outline: none;
  color: var(--fg); font-size: 15px; font-family: var(--font-ui);
  caret-color: var(--accent);
}
.palette__input input::placeholder { color: var(--fg-faint); }
.palette__list { padding: 8px; max-height: 400px; overflow-y: auto; }
.palette__item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: 8px;
  cursor: pointer; transition: background 0.1s;
}
.palette__item:hover { background: var(--sidebar-hover); }
.palette__item-icon { width: 28px; height: 28px; border-radius: 6px; background: var(--bg-soft); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.palette__item-name { font-weight: 600; font-size: 13px; }
.palette__item-desc { font-size: 11px; color: var(--fg-faint); }
.palette__item kbd { font-size: 10px; background: var(--bg-soft); padding: 2px 6px; border-radius: 4px; color: var(--fg-faint); margin-left: auto; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.13); }

/* ===== RESPONSIVE ===== */
@media (max-width: 800px) { .sidebar, .rightdock { display: none; } }

</style>
</head>
<body>
<div id="root"></div>
<script>
/* ================================================================
   Reasonix Web App — Faithful replica of real Reasonix Desktop
   Based on App.tsx, ToolCard.tsx, Message.tsx, StatusBar.tsx
   ================================================================ */
(function() {
"use strict";

}

// ===== DELETE SESSION =====
function deleteSession(id) {
  if (sessionOrder.length <= 1) return;
  delete sessions[id];
  sessionOrder = sessionOrder.filter(function(s) { return s !== id; });
  if (state.session === id) {
    state.session = sessionOrder[0];
  }
  rebuildSidebar();
  navigate('chat', state.session);
}

// ===== RENDER =====
function esc(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function mdToHTML(s) {
  var h = esc(s);
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  h = h.replace(/```([\s\S]*?)```/g, function(_, c) {
    return '<pre><code>' + c.trim() + '</code></pre>';
  });
  h = h.replace(/\n\n/g, '</p><p>');
  h = h.replace(/\n/g, '<br>');
  h = '<p>' + h + '</p>';
  h = h.replace(/<p><\/p>/g, '');
  return h;
}

function renderChat() {
  var msgs = sessions[state.session] || sessions['current'];
  var h = '';
  for (var i = 0; i < msgs.length; i++) {
    var m = msgs[i];
    if (m.role === 'system') {
      h += '<div class="msg--system">— ' + esc(m.text) + ' —</div>';
    } else if (m.role === 'user') {
      h += '<div class="msg--user"><div class="msg__body"><div class="msg__text">' + esc(m.text) + '</div></div></div>';
    } else {
      h += '<div class="msg--assistant"><div class="msg__body">' + mdToHTML(m.text) + '</div>';
      if (m.tools) {
        for (var j = 0; j < m.tools.length; j++) {
          var t = m.tools[j];
          var icon = t.name.indexOf('codegraph') === 0 ? '◈' : t.name === 'bash' ? '&gt;' : '✓';
          var statusIcon = t.status === 'ok' ? '<span class="tool__status-icon tool__status-icon--ok">✓</span>' :
                           t.status === 'err' ? '<span class="tool__status-icon tool__status-icon--err">✗</span>' : '';
          h += '<div class="tool">';
          h += '<button class="tool__head" onclick="var b=this.nextElementSibling;b.style.display=b.style.display===\'block\'?\'none\':\'block\';this.querySelector(\'.tool__chevron\').classList.toggle(\'tool__chevron--open\')">';
          h += statusIcon;
          h += '<span class="tool__name">' + esc(t.name) + '</span>';
          h += '<span class="tool__duration">&nbsp;</span>';
          h += '<span class="tool__chevron">▶</span>';
          h += '</button>';
          h += '<div class="tool__body"><div class="code-block">' + esc(t.output) + '</div></div>';
          h += '</div>';
        }
      }
      h += '</div>';
    }
  }
  $('transcriptInner').innerHTML = h;
  var ts = $('transcript');
  ts.scrollTop = ts.scrollHeight;
  state.turnCount = msgs.filter(function(m){ return m.role === 'user'; }).length;
  $('turnVal').textContent = state.turnCount;
}

  for (var i = 0; i < sessionOrder.length; i++) {
    var id = sessionOrder[i];
    var msgs = sessions[id] || [];
    var turnCount = msgs.filter(function(m){ return m.role === 'user'; }).length;
    var active = (id === state.session) ? ' sidebar__item--active' : '';
    var icon = sessionIcons[id] || '💬';
    var label = sessionLabels[id] || (id.replace('session-', 'New session '));
    var tag = turnCount > 0 ? '<span class="sb-tag">' + turnCount + '</span>' : '';
    h += '<div class="sidebar__item' + active + '" data-nav="chat" data-session="' + id + '"><span class="sb-ico">●</span> ' + esc(label) + tag;
    if (sessionOrder.length > 1) {
      h += '<span class="sb-del-btn" data-del="' + id + '" onclick="event.stopPropagation();App.deleteSession(\'' + id + '\')" title="Delete session">✕</span>';
    }
    h += '</div>';
  }
  container.innerHTML = h;

  // Rebind sidebar item clicks via delegation is already set up
}

function renderSessions() {
  var h = '';
  // New session card first
  h += '<div class="sess-card" style="border-color:var(--ok);border-style:dashed" onclick="App.createSession()"><div class="sess-card__av" style="background:rgba(58,209,126,0.12);color:var(--ok)">＋</div><div class="sess-card__info"><div class="sess-card__name" style="color:var(--ok)">New Session</div><div class="sess-card__sub">Start a fresh conversation</div></div></div>';
  for (var i = 0; i < sessionOrder.length; i++) {
    var id = sessionOrder[i];
    var msgs = sessions[id] || [];
    var turns = msgs.filter(function(m){ return m.role === 'user'; }).length;
    var label = sessionLabels[id] || id.replace('session-', 'New session ');
    var icon = sessionIcons[id] || '💬';
    var sub = (id === 'current') ? 'reasonix-platform/ · deepseek-v4-flash' :
              (id === 'api') ? 'backend/ · deepseek-v4-flash' :
              (id === 'auth') ? 'auth-service/ · deepseek-v4-pro' :
              (id === 'test') ? 'core/ · deepseek-v4-flash' :
              'New session · deepseek-v4-flash';
    var meta = turns + ' turns';
    h += '<div class="sess-card" data-goto="chat" data-session="' + id + '"><div class="sess-card__av">' + icon + '</div><div class="sess-card__info"><div class="sess-card__name">' + esc(label) + '</div><div class="sess-card__sub">' + esc(sub) + '</div></div><div class="sess-card__meta">' + esc(meta) + '</div></div>';
  }
  $('sessionsList').innerHTML = h;
  bindSessionCards();
}

function renderSkills() {
  var h = '';
  for (var i = 0; i < skills.length; i++) {
    var s = skills[i];
    var tag = s.run === 'subagent' ? '<span class="skill-tag-sub">🧬 subagent</span>' : '<span class="skill-tag-inline">📄 inline</span>';
    h += '<div class="sess-card" data-skill-idx="' + i + '"><div class="sess-card__av">' + (s.run==='subagent'?'🧬':'📄') + '</div><div class="sess-card__info"><div class="sess-card__name">' + esc(s.name) + tag + '</div><div class="sess-card__sub">' + esc(s.desc) + '</div></div></div>';
  }
  $('skillsList').innerHTML = h;
  bindSkillCards();
}

function renderSkillDetail(idx) {
  var s = skills[idx];
  var tag = s.run === 'subagent' ? 'skill-tag-sub' : 'skill-tag-inline';
  var label = s.run === 'subagent' ? '🧬 subagent' : '📄 inline';
  var h = '<div style="padding:30px 40px;max-width:700px">';
  h += '<h2>' + esc(s.name) + '</h2>';
  h += '<div style="margin-bottom:16px"><span class="' + tag + '">' + label + '</span> <span style="font-size:11px;color:var(--fg-faint);margin-left:8px">Scope: project</span></div>';
  h += '<div style="font-size:13px;line-height:1.6;color:var(--fg-dim);margin-bottom:20px">' + esc(s.desc) + '</div>';
  h += '<div style="font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--fg-faint);margin-bottom:10px;font-weight:600">Body</div>';
  h += '<pre style="background:var(--bg-soft);border:1px solid var(--border);border-radius:8px;padding:16px;font-family:var(--font-mono);font-size:12px;line-height:1.6;color:var(--fg-dim);overflow-x:auto;white-space:pre-wrap">' + esc(s.body) + '</pre>';
  h += '<button style="margin-top:20px;padding:8px 16px;border-radius:7px;border:1px solid var(--border);background:var(--bg-soft);color:var(--fg-dim);cursor:pointer;font-family:var(--font-ui);font-size:12px" onclick="App.navigate(\'skills\')">← Back to Skills</button>';
  h += '</div>';
  $('skillDetail').innerHTML = h;
}

// ===== BINDINGS =====
function bindSessionCards() {
  var cards = document.querySelectorAll('#sessionsList .sess-card');
  for (var i = 0; i < cards.length; i++) {
    cards[i].addEventListener('click', function() {
      var s = this.dataset.session;
      if (s) { navigate('chat', s); return; }
    });
  }
}

function bindSkillCards() {
  var cards = document.querySelectorAll('#skillsList .sess-card');
  for (var i = 0; i < cards.length; i++) {
    cards[i].addEventListener('click', function() {
      var idx = parseInt(this.dataset.skillIdx);
      showSkillDetail(idx);
    });
  }
}

function showSkillDetail(idx) {
  renderSkillDetail(idx);
  showPage('page-skill-detail');
  document.getElementById('pageTitle').textContent = skills[idx].name;
  document.getElementById('pageSub').textContent = 'Skill Detail';
  showComposer(false);
  updateSidebarActive('skills');
}

// ===== NAVIGATION =====
function navigate(page, session) {
  state.page = page;
  if (session) state.session = session;
  rebuildSidebar();
  updateSidebarActive(page, session);
  var pageId = 'page-' + page;
  showPage(pageId);
  document.getElementById('pageTitle').textContent =
    { chat:'Chat', sessions:'All Sessions', skills:'Skills', settings:'Settings' }[page] || page;
  var sub = '';
  if (page === 'chat' && state.session !== 'current') {
    sub = sessionLabels[state.session] || state.session;
  }
  document.getElementById('pageSub').textContent = sub;
  showComposer(page === 'chat');
  if (page === 'chat') renderChat();
  if (page === 'sessions') renderSessions();
  if (page === 'skills') renderSkills();
  if (page === 'settings') {
    var keyInput = document.getElementById('apiKeyInput');
    if (keyInput) {
      keyInput.value = localStorage.getItem('reasonix_api_key') || AppConfig.DEEPSEEK_API_KEY || '';
    }
  }
}

function showPage(id) {
  var pages = document.querySelectorAll('.page');
  for (var i = 0; i < pages.length; i++) pages[i].classList.remove('page--active');
  var target = document.getElementById(id);
  if (target) target.classList.add('page--active');
}

function showComposer(show) {
  var cw = document.querySelector('.composer-wrap');
  if (cw) cw.style.display = show ? '' : 'none';
}

function updateSidebarActive(page, session) {
  var items = document.querySelectorAll('.sidebar__item');
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    var nav = it.dataset.nav;
    var ses = it.dataset.session;
    it.classList.remove('sidebar__item--active');
    if (nav === page && (!ses || ses === (session || state.session))) {
      it.classList.add('sidebar__item--active');
    }
  }
}

// ===== MODE =====
function cycleMode() {
  var modes = ['auto', 'plan', 'yolo'];
  var idx = modes.indexOf(state.mode);
  state.mode = modes[(idx + 1) % 3];
  var chip = $('modeChip');
  chip.textContent = state.mode.toUpperCase();
  chip.className = 'mode-chip mode-chip--' + state.mode;
}

// ===== SEND =====
function send() {
  var ta = $('composerInput');
  var txt = ta.value.trim();
  if (!txt || state.page !== 'chat') return;
  if (!sessions[state.session]) sessions[state.session] = [];
  sessions[state.session].push({ role:'user', text:txt });
  ta.value = ''; ta.style.height = 'auto';
  renderChat();

  // Thinking indicator
  var inner = $('transcriptInner');
  var dot = document.createElement('div');
  dot.className = 'msg--assistant';
  dot.innerHTML = '<div class="msg__body"><p style="color:var(--fg-faint)">Thinking<span class="dot1">.</span><span class="dot2">.</span><span class="dot3">.</span></p></div>';
  inner.appendChild(dot);
  var ts = $('transcript');
  ts.scrollTop = ts.scrollHeight;
  var d1 = dot.querySelector('.dot1'), d2 = dot.querySelector('.dot2'), d3 = dot.querySelector('.dot3');
  var dotAnim = setInterval(function() {
    d1.style.opacity = d1.style.opacity === '1' ? '0.3' : '1';
    setTimeout(function(){ d2.style.opacity = d2.style.opacity === '1' ? '0.3' : '1'; }, 200);
    setTimeout(function(){ d3.style.opacity = d3.style.opacity === '1' ? '0.3' : '1'; }, 400);
  }, 600);

  // Build messages array from session history
  var apiMessages = [];
  var history = sessions[state.session] || [];
  for (var i = 0; i < history.length; i++) {
    var msg = history[i];
    if (msg.role === 'system') {
      apiMessages.push({ role: 'system', content: msg.text });
    } else if (msg.role === 'user') {
      apiMessages.push({ role: 'user', content: msg.text });
    } else if (msg.role === 'agent') {
      apiMessages.push({ role: 'assistant', content: msg.text });
    }
  }

  // Call real DeepSeek API
  var apiKey = AppConfig.DEEPSEEK_API_KEY;
  if (!apiKey) {
    clearInterval(dotAnim);
    dot.remove();
    sessions[state.session].push({
      role:'agent',
      text:'⚠️ **API Key 未配置**\n\n请在 Settings 页面输入你的 DeepSeek API Key，或在 `.env` 文件中设置 `DEEPSEEK_API_KEY`。\n\n获取 Key: [platform.deepseek.com](https://platform.deepseek.com)'
    });
    renderChat();
    updateContext();
    return;
  }

  fetch('https://api.deepseek.com/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + apiKey
    },
    body: JSON.stringify({
      model: 'deepseek-v4-flash',
      messages: apiMessages,
      max_tokens: 4096,
      temperature: 0.0
    })
  })
  .then(function(res) {
    if (!res.ok) {
      return res.json().then(function(err) {
        throw new Error('API Error ' + res.status + ': ' + (err.error && err.error.message || res.statusText));
      });
    }
    return res.json();
  })
  .then(function(data) {
    clearInterval(dotAnim);
    dot.remove();
    var reply = data.choices && data.choices[0] && data.choices[0].message;
    if (reply && reply.content) {
      sessions[state.session].push({
        role:'agent',
        text: reply.content
      });
    } else {
      sessions[state.session].push({
        role:'agent',
        text:'(Empty response from API)'
      });
    }
    // Update context usage if available
    if (data.usage) {
      var total = data.usage.total_tokens || 0;
      document.getElementById('ctxVal').textContent = (total / 1000).toFixed(1) + 'k';
    }
    renderChat();
    updateContext();
  })
  .catch(function(err) {
    clearInterval(dotAnim);
    dot.remove();
    sessions[state.session].push({
      role:'agent',
      text:'❌ **API 调用失败**\n\n```\n' + err.message + '\n```\n\n请检查:\n- API Key 是否正确\n- 网络连接是否正常\n- 是否需要配置代理'
    });
    renderChat();
    updateContext();
  });
}

// ===== DOCK =====
function switchDockTab(tab) {
  state.dockTab = tab;
  var tabs = document.querySelectorAll('.rightdock__tab');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.toggle('rightdock__tab--active', tabs[i].dataset.docktab === tab);
  }
  $('dock-context').style.display = tab === 'context' ? '' : 'none';
  $('dock-files').style.display = tab === 'files' ? '' : 'none';
  $('dock-changes').style.display = tab === 'changes' ? '' : 'none';
}

function toggleDock() {
  state.dockOpen = !state.dockOpen;
  $('rightdock').style.display = state.dockOpen ? '' : 'none';
}

// ===== PALETTE =====
function openPalette() {
  state.paletteOpen = true;
  $('paletteOverlay').classList.add('palette-overlay--open');
  $('paletteInput').value = '';
  $('paletteInput').focus();
  renderPalette('');
}

function closePalette() {
  state.paletteOpen = false;
  $('paletteOverlay').classList.remove('palette-overlay--open');
}

function renderPalette(query) {
  var h = '';
  var lq = query.toLowerCase();
  for (var i = 0; i < paletteCommands.length; i++) {
    var c = paletteCommands[i];
    if (query && c.name.toLowerCase().indexOf(lq) === -1 && c.desc.toLowerCase().indexOf(lq) === -1) continue;
    h += '<div class="palette__item" data-pidx="' + i + '"><span class="palette__item-icon">' + c.icon + '</span><div><div class="palette__item-name">' + esc(c.name) + '</div><div class="palette__item-desc">' + esc(c.desc) + '</div></div><kbd>⏎</kbd></div>';
  }
  $('paletteList').innerHTML = h;
  var items = document.querySelectorAll('#paletteList .palette__item');
  for (var j = 0; j < items.length; j++) {
    items[j].addEventListener('click', function() {
      paletteCommands[parseInt(this.dataset.pidx)].action();
    });
  }
}

// ===== CONTEXT =====
function updateContext() {
  var t = Math.floor(2000 + Math.random() * 3000);
  $('ctxVal').textContent = (t / 1000).toFixed(1) + 'k';
  $('ctxGauge').style.width = (t / 64000 * 100) + '%';
}

// ===== CLOCK =====
function tick() { $('clockVal').textContent = new Date().toTimeString().slice(0, 8); }

// ===== EVENT SETUP =====
function setupEvents() {
  // Send button
  $('sendBtn').addEventListener('click', send);

  // Composer keyboard
  $('composerInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    var self = this;
    setTimeout(function() {
      self.style.height = 'auto';
      self.style.height = Math.min(self.scrollHeight, 200) + 'px';
    }, 0);
  });

  // Sidebar clicks — use event delegation since items rebuild dynamically
  document.querySelector('.sidebar').addEventListener('click', function(e) {
    var item = e.target.closest('.sidebar__item');
    if (!item) return;
    // Ignore if clicking delete button
    if (e.target.closest('.sb-del-btn')) return;
    var nav = item.dataset.nav;
    var ses = item.dataset.session;
    if (nav) navigate(nav, ses || 'current');
  });

  // Dock tabs
  var dockTabs = document.querySelectorAll('.rightdock__tab');
  for (var j = 0; j < dockTabs.length; j++) {
    dockTabs[j].addEventListener('click', function() {
      switchDockTab(this.dataset.docktab);
    });
  }

  // Palette
  $('paletteOverlay').addEventListener('click', function(e) {
    if (e.target === this) closePalette();
  });
  $('paletteInput').addEventListener('input', function() {
    renderPalette(this.value);
  });
  $('paletteInput').addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closePalette();
    if (e.key === 'Enter') {
      var first = document.querySelector('#paletteList .palette__item');
      if (first) paletteCommands[parseInt(first.dataset.pidx)].action();
    }
  });

  // Global keyboard
  document.addEventListener('keydown', function(e) {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openPalette(); }
    if ((e.metaKey || e.ctrlKey) && e.key === 'n') { e.preventDefault(); createSession(); }
    if (e.key === 'Escape' && state.paletteOpen) closePalette();
  });
}

// ===== PUBLIC API =====
window.App = {
  navigate: navigate,
  cycleMode: cycleMode,
  toggleDock: toggleDock,
  openPalette: openPalette,
  closePalette: closePalette,
  send: send,
  createSession: function(name) { createSession(name); },
  deleteSession: function(id) { deleteSession(id); },
  saveApiKey: function() {
    var key = document.getElementById('apiKeyInput').value.trim();
    if (key) {
      localStorage.setItem('reasonix_api_key', key);
      AppConfig.DEEPSEEK_API_KEY = key;
      hideKeyBanner();
      alert('API Key saved ✓');
    }
  }
};

// ===== BOOT =====
try {
  loadApiKey();
  buildHTML();
  setupEvents();
  rebuildSidebar();
  navigate('chat', 'current');
  renderSessions();
  renderSkills();
  updateContext();
  setInterval(tick, 1000);
  tick();
  // Show key prompt if no key configured
  if (!AppConfig.DEEPSEEK_API_KEY) {
    showKeyBanner();
  }
} catch(e) {
  document.getElementById('root').innerHTML = '<div style="padding:40px;color:#f0573f;font-family:monospace"><h2>Boot Error</h2><pre>' + e.message + '\n\n' + e.stack + '</pre></div>';
  console.error(e);
}

// ===== KEY BANNER =====
function showKeyBanner() {
  var banner = document.createElement('div');
  banner.id = 'key-banner';
  banner.innerHTML = '<div style="margin:16px 20px;max-width:820px;padding:16px 20px;background:rgba(255,106,61,0.08);border:1px solid rgba(255,106,61,0.25);border-radius:10px;display:flex;align-items:center;gap:14px">' +
    '<span style="font-size:24px">🔑</span>' +
    '<div style="flex:1"><b style="color:var(--accent)">API Key 未配置</b><br><span style="font-size:12px;color:var(--fg-dim))">在 Settings 页面输入 DeepSeek API Key 后即可使用。获取: platform.deepseek.com</span></div>' +
    '<button onclick="App.navigate(\'settings\')" style="padding:8px 16px;border-radius:7px;border:1px solid var(--accent);background:var(--accent-soft);color:var(--accent);cursor:pointer;font-family:inherit;font-size:12px;white-space:nowrap;font-weight:600">Configure →</button>' +
    '</div>';
  var wrap = document.querySelector('.transcript__inner');
  if (wrap) wrap.insertBefore(banner, wrap.firstChild);
}

// ===== HIDE KEY BANNER =====
function hideKeyBanner() {
  var b = document.getElementById('key-banner');
  if (b) b.remove();
}

})();

</script>
</body>
</html>
